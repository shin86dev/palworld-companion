name: Windows package

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v1.0.0"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install pinned dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build application
        run: python -m PyInstaller --clean --noconfirm packaging/PalPlus.spec

      - name: Smoke-test packaged executable
        shell: pwsh
        run: |
          $process = Start-Process ".\dist\PalPlus\PalPlus.exe" -ArgumentList "--check" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            $startupLog = Join-Path $env:LOCALAPPDATA "PalworldCompanion\startup-error.log"
            if (Test-Path -LiteralPath $startupLog) { Get-Content -Raw -LiteralPath $startupLog }
            throw "Packaged validation failed: $($process.ExitCode)"
          }

      - name: Build per-user installer
        shell: pwsh
        run: |
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { "1.0.0" } else { "1.0.0-dev" }
          $repositoryUrl = "${{ github.server_url }}/${{ github.repository }}"
          & $compiler "/DMyAppVersion=$version" "/DMyAppURL=$repositoryUrl" packaging\PalPlus.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed: $LASTEXITCODE" }

      - name: Write SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist\installer\PalPlus-Setup.exe).Hash.ToLowerInvariant()
          "$hash  PalPlus-Setup.exe" | Set-Content -Encoding ascii dist\installer\PalPlus-Setup.exe.sha256

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PalPlus-Windows-1.0.0
          path: |
            dist/installer/PalPlus-Setup.exe
            dist/installer/PalPlus-Setup.exe.sha256
          if-no-files-found: error

      - name: Publish v1.0.0 release
        if: github.ref == 'refs/tags/v1.0.0'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.0.0 *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create v1.0.0 --verify-tag --title "PalPlus v1.0.0" --notes-file RELEASE_NOTES.md
          }
          gh release upload v1.0.0 dist\installer\PalPlus-Setup.exe dist\installer\PalPlus-Setup.exe.sha256 --clobber
